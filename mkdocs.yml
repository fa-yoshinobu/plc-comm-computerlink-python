site_dir: _site
docs_dir: docsrc
site_name: Toyopuc Computer Link Python API
site_url: https://fa-yoshinobu.github.io/plc-comm-computerlink-python/
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
plugins:
  - search
  - mkdocstrings:
      default_handler: python
exclude_docs: |
  internal_docs/**
  maintainer/**
  validation/**
nav:
  - Overview: index.md
  - Getting Started: user/GETTING_STARTED.md
  - Usage Guide: user/USAGE_GUIDE.md
  - Supported PLC Registers: user/SUPPORTED_REGISTERS.md
  - Profiles: user/PROFILES.md
  - Gotchas: user/GOTCHAS.md
  - User Guide compatibility: user/USER_GUIDE.md
  - Latest Communication Verification: user/LATEST_COMMUNICATION_VERIFICATION.md
  - Model Ranges: user/MODEL_RANGES.md
  - API Reference:
      - Client: api/client.md
