name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Upload
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then tag="${{ github.ref_name }}"; else tag="v${{ inputs.version }}"; fi
          gh release upload "$tag" dist/* --clobber || gh release create "$tag" dist/* --target main --title "Release $tag" --generate-notes
