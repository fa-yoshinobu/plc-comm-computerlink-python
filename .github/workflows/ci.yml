name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff lint
        run: python -m ruff check toyopuc tests scripts samples

      - name: Run Ruff format check
        run: python -m ruff format --check toyopuc tests scripts samples

      - name: Run mypy
        run: python -m mypy toyopuc

      - name: Run tests
        run: python -m pytest -q

  trigger-docs-rebuild:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs rebuild
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          if [ -z "$DOCS_REPO_TOKEN" ]; then
            echo "::notice::DOCS_REPO_TOKEN is not configured; skipping docs rebuild dispatch."
            exit 0
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DOCS_REPO_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/fa-yoshinobu/plc-comm-docs-site/dispatches \
            -d '{"event_type":"source-updated","client_payload":{"repo":"${{ github.repository }}"}}'
