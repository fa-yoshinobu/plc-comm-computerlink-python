name: Sample build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  sample-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install package and sample tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install mypy

      - name: Compile samples
        run: python -m py_compile samples/*.py

      - name: Type check samples
        run: mypy --config-file /dev/null samples/ --ignore-missing-imports
